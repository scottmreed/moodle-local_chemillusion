name: Package release ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for the ZIP (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch RDKit.js bundle (Phase 1B)
        run: bash scripts/update-rdkit-js.sh

      - name: Build release ZIP
        run: bash scripts/package-plugin.sh --version "${{ steps.ver.outputs.version }}" --moodle moodle45

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: local_chemillusion-${{ steps.ver.outputs.version }}
          path: dist/*.zip

      - name: Attach to GitHub release
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
