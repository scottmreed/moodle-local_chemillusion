<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240"
     font-family="sans-serif" role="img" aria-labelledby="benzene-title">
  <title id="benzene-title">Benzene aromatic π electron cloud: 6 sp² carbons with delocalised π system</title>
  <!-- π cloud above ring (upper torus) -->
  <ellipse cx="150" cy="88" rx="58" ry="22" fill="#4dabf7" fill-opacity="0.40" stroke="#1c7ed6" stroke-width="1"/>
  <!-- π cloud below ring (lower torus) -->
  <ellipse cx="150" cy="152" rx="58" ry="22" fill="#ff922b" fill-opacity="0.40" stroke="#e8590c" stroke-width="1"/>
  <!-- Benzene ring: regular hexagon, r=52 -->
  <polygon points="150,68 195,94 195,146 150,172 105,146 105,94"
           fill="none" stroke="#333" stroke-width="2.5"/>
  <!-- Inner circle (aromatic) -->
  <circle cx="150" cy="120" r="26" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Carbon labels -->
  <text x="150" y="60"  text-anchor="middle" font-size="11" fill="#333">C</text>
  <text x="204" y="96"  text-anchor="start"  font-size="11" fill="#333">C</text>
  <text x="204" y="152" text-anchor="start"  font-size="11" fill="#333">C</text>
  <text x="150" y="186" text-anchor="middle" font-size="11" fill="#333">C</text>
  <text x="96"  y="152" text-anchor="end"    font-size="11" fill="#333">C</text>
  <text x="96"  y="96"  text-anchor="end"    font-size="11" fill="#333">C</text>
  <text x="150" y="226" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Delocalised π cloud (6 π electrons, sp² carbons)</text>
</svg>
