<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240"
     font-family="sans-serif" role="img" aria-labelledby="butadiene-title">
  <title id="butadiene-title">1,3-Butadiene conjugated π system: four adjacent sp² carbons</title>
  <!-- σ backbone -->
  <line x1="60"  y1="120" x2="110" y2="120" stroke="#333" stroke-width="2.5"/>
  <line x1="110" y1="120" x2="190" y2="120" stroke="#333" stroke-width="2.5"/>
  <line x1="190" y1="120" x2="240" y2="120" stroke="#333" stroke-width="2.5"/>
  <!-- C=C double bond lines (upper) -->
  <line x1="60"  y1="112" x2="110" y2="112" stroke="#333" stroke-width="2"/>
  <line x1="190" y1="112" x2="240" y2="112" stroke="#333" stroke-width="2"/>
  <!-- Carbon dots -->
  <circle cx="60"  cy="120" r="5" fill="#333"/>
  <circle cx="110" cy="120" r="5" fill="#333"/>
  <circle cx="190" cy="120" r="5" fill="#333"/>
  <circle cx="240" cy="120" r="5" fill="#333"/>
  <!-- p-orbital lobes upper (blue) -->
  <ellipse cx="60"  cy="88" rx="13" ry="26" fill="#4dabf7" fill-opacity="0.55" stroke="#1c7ed6" stroke-width="1"/>
  <ellipse cx="110" cy="88" rx="13" ry="26" fill="#4dabf7" fill-opacity="0.55" stroke="#1c7ed6" stroke-width="1"/>
  <ellipse cx="190" cy="88" rx="13" ry="26" fill="#4dabf7" fill-opacity="0.55" stroke="#1c7ed6" stroke-width="1"/>
  <ellipse cx="240" cy="88" rx="13" ry="26" fill="#4dabf7" fill-opacity="0.55" stroke="#1c7ed6" stroke-width="1"/>
  <!-- p-orbital lobes lower (orange) -->
  <ellipse cx="60"  cy="152" rx="13" ry="26" fill="#ff922b" fill-opacity="0.55" stroke="#e8590c" stroke-width="1"/>
  <ellipse cx="110" cy="152" rx="13" ry="26" fill="#ff922b" fill-opacity="0.55" stroke="#e8590c" stroke-width="1"/>
  <ellipse cx="190" cy="152" rx="13" ry="26" fill="#ff922b" fill-opacity="0.55" stroke="#e8590c" stroke-width="1"/>
  <ellipse cx="240" cy="152" rx="13" ry="26" fill="#ff922b" fill-opacity="0.55" stroke="#e8590c" stroke-width="1"/>
  <!-- Overlap shading (upper) -->
  <ellipse cx="85"  cy="88" rx="38" ry="16" fill="#74c0fc" fill-opacity="0.28"/>
  <ellipse cx="215" cy="88" rx="38" ry="16" fill="#74c0fc" fill-opacity="0.28"/>
  <!-- Central delocalisation arrow -->
  <line x1="130" y1="120" x2="170" y2="120" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Labels -->
  <text x="60"  y="186" text-anchor="middle" font-size="10" fill="#555">C1</text>
  <text x="110" y="186" text-anchor="middle" font-size="10" fill="#555">C2</text>
  <text x="190" y="186" text-anchor="middle" font-size="10" fill="#555">C3</text>
  <text x="240" y="186" text-anchor="middle" font-size="10" fill="#555">C4</text>
  <text x="150" y="226" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Conjugated π system (4 sp² carbons)</text>
</svg>
